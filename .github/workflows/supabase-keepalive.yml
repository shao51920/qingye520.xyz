name: Supabase Keep-Alive

on:
  # 每天 UTC 08:00（北京时间 16:00）自动执行
  schedule:
    - cron: '0 8 * * *'
  # 保留手动触发入口，方便在 GitHub 后台点击运行测试
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent hibernation
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP Status: $response"

          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase keep-alive ping succeeded."
          else
            echo "❌ Supabase keep-alive ping failed with status $response"
            exit 1
          fi
