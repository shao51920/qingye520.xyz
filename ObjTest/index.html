<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自我客体化测试 - 探索真实自我</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&swap"
    rel="stylesheet">

  <!-- Shared UI -->
  <link rel="stylesheet" href="../shared/test-ui.css?v=20260417">
  <link rel="stylesheet" href="../shared/auth.css">
  <link rel="stylesheet" href="../shared/comments.css">
</head>

<body class="landing-active">
  <canvas id="particles-canvas"></canvas>
  <div id="auth-status"></div>

  <!-- 返回主页按钮 -->
  <a href="../index.html" class="nav-home-btn" id="globalHomeBtn" title="返回主页">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
      <polyline points="9 22 9 12 15 12 15 22" />
    </svg>
  </a>

  <!-- 1. Landing Page -->
  <section id="landing" class="page active">
    <div class="landing-content">
      <div class="logo-glow"></div>
      <h1 class="title-main">
        <span class="title-line2">自我客体化测评</span>
      </h1>
      <p class="subtitle">评估你在多大程度上将自己当作物品或工具</p>
      <div class="intro-cards">
        <div class="intro-card">
          <div class="intro-icon">🔒</div>
          <p>一共40道题</p>
        </div>
        <div class="intro-card">
          <div class="intro-icon">🕯️</div>
          <p>评估主体认知</p>
        </div>
        <div class="intro-card">
          <div class="intro-icon">⚡</div>
          <p id="objtest-participant-count">加载中...</p>
        </div>
      </div>
      <div class="action-buttons-wrapper">
        <button id="start-btn" class="btn-primary" onclick="startTest()">
          <span>开始探索之旅</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </button>
      </div>
      <p class="disclaimer">本测评可作为自我探索之用，不能替代专业诊断。</p>
    </div>
  </section>

  <!-- 2. Quiz Page -->
  <section id="quiz" class="page">
    <div class="quiz-header">
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text">
        <span id="current-q">1</span> / <span id="total-q">40</span>
      </div>
    </div>
    <div class="quiz-body">
      <div id="question-container" class="question-container"></div>
    </div>
    <div class="quiz-footer">
      <button class="btn-secondary" onclick="prevQuestion()">上一题</button>
      <button class="btn-primary" onclick="nextQuestion()">下一题</button>
    </div>
  </section>

  <!-- 3. Loading Page -->
  <section id="loading" class="page">
    <div class="loading-content">
      <div class="loading-orb">
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-core"></div>
      </div>
      <h2 class="loading-title">正在解构主体认知...</h2>
    </div>
  </section>

  <!-- 4. Result Page -->
  <section id="result" class="page">
    <div class="result-container">
      <div id="result-display"></div>

      <div class="result-actions">
        <button class="btn-primary" onclick="window.location.reload()">
          <span>重新测试</span>
        </button>
      </div>

      <div class="author-credit-box">
        <p>作者：青野 | 公众号：觉醒诗社</p>
      </div>

      <div class="result-comments-shell">
        <div id="comments-section" data-page="objtest"></div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/supabase-config.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/comments.js"></script>
  <script src="questions.js"></script>
  <script src="results.js"></script>
  <script src="../shared/test-app.js"></script>
</body>

</html>
