<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>档案室 · 管理控制台</title>
  <meta name="description" content="管理控制台 — 数据真相，一览无余。">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       Design Kernel: 冷酷档案室 (Cold Archive)
       "剥离一切伪装，只看数据真相。"
       ═══════════════════════════════════════════ */

    :root {
      --void: #0b0b0b;
      --surface: #111111;
      --line: rgba(255, 255, 255, 0.06);
      --line-hover: rgba(255, 255, 255, 0.12);
      --text-primary: rgba(255, 255, 255, 0.82);
      --text-secondary: rgba(255, 255, 255, 0.38);
      --text-ghost: rgba(255, 255, 255, 0.18);
      --accent: #c8c8c8;
      --accent-num: #e0e0e0;
      --danger: #f87171;
      --warn: #fbbf24;
      --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    ::selection {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    html,
    body {
      height: 100%;
      background: var(--void);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Auth Guard: 拦截屏 ── */
    #guard-wall {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--void);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      transition: opacity 0.4s ease;
    }

    #guard-wall.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .guard-text {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .guard-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% {
        content: '';
      }

      25% {
        content: '.';
      }

      50% {
        content: '..';
      }

      75% {
        content: '...';
      }
    }

    /* ── 顶栏 ── */
    .archive-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(11, 11, 11, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .archive-title {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .archive-title span {
      color: var(--text-primary);
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-actions a,
    .header-actions button {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: color 0.2s;
      text-decoration: none;
    }

    .header-actions a:hover,
    .header-actions button:hover {
      color: var(--text-primary);
    }

    /* ── 主容器 ── */
    .archive-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── Tab 切换 ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--line);
      margin-bottom: 28px;
    }

    .tab-item {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      padding: 10px 20px;
      margin-bottom: -1px;
      cursor: pointer;
      transition: color 0.25s, border-color 0.25s;
    }

    .tab-item:hover {
      color: var(--text-primary);
    }

    .tab-item.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }

    /* ── 面板容器 ── */
    .panel {
      display: none;
      animation: panelIn 0.3s ease;
    }

    .panel.active {
      display: block;
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Dashboard 统计卡片 ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
      margin-bottom: 20px;
    }

    .stat-cell {
      background: var(--surface);
      padding: 22px 16px;
      text-align: center;
    }

    .stat-cell:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .stat-number {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 300;
      color: var(--accent-num);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
      transition: color 0.3s;
    }

    .stat-cell:hover .stat-number {
      color: #fff;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── 系统状态行 ── */
    .meta-line {
      font-size: 11px;
      color: var(--text-ghost);
      padding: 12px 0;
      border-top: 1px solid var(--line);
      letter-spacing: 0.04em;
      line-height: 1.7;
    }

    .meta-line strong {
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ── 表格 ── */
    .data-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 12px;
      min-width: 600px;
    }

    .data-table thead th {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-ghost);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
      user-select: none;
    }

    .data-table tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--text-primary);
      vertical-align: middle;
      transition: background 0.15s;
    }

    .data-table tbody tr:hover td {
      background: rgba(255, 255, 255, 0.015);
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    .data-table tbody tr.row-hidden td {
      opacity: 0.4;
    }

    /* 单元格内的次要文字 */
    .cell-dim {
      color: var(--text-secondary);
    }

    .cell-mono {
      font-variant-numeric: tabular-nums;
    }

    .cell-truncate {
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cell-user {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    /* ── 头像 ── */
    .avatar-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      font-size: 14px;
      flex-shrink: 0;
    }

    img.avatar-dot {
      object-fit: cover;
    }

    /* ── 评论图片缩略图 ── */
    .comment-img-thumb {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      object-fit: cover;
      cursor: pointer;
      border: 1px solid var(--line);
      transition: opacity 0.2s;
    }

    .comment-img-thumb:hover {
      opacity: 0.7;
    }

    /* 极简标签 */
    .tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      border: 1px solid var(--line);
      padding: 1px 8px;
      white-space: nowrap;
    }

    .tag--accent {
      color: var(--accent-num);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .tag--warn {
      color: var(--warn);
      border-color: rgba(251, 191, 36, 0.2);
    }

    .tag--danger {
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.2);
    }

    /* ── 操作按钮 ── */
    .btn-sm {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border: 1px solid var(--line);
      background: none;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-sm:hover {
      color: var(--text-primary);
      border-color: var(--line-hover);
    }

    .btn-sm--warn {
      color: var(--warn);
      border-color: rgba(251, 191, 36, 0.25);
    }

    .btn-sm--warn:hover {
      background: rgba(251, 191, 36, 0.08);
    }

    .btn-sm--danger {
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.25);
    }

    .btn-sm--danger:hover {
      background: rgba(248, 113, 113, 0.08);
    }

    .btn-gap {
      display: inline-flex;
      gap: 6px;
    }

    /* ── 加载提示 & 空态 ── */
    .loading-hint,
    .empty-state {
      padding: 40px 0;
      text-align: center;
      font-size: 11px;
      color: var(--text-ghost);
      letter-spacing: 0.12em;
    }

    .empty-state {
      padding: 48px 0;
    }

    /* ── 工具栏 ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .toolbar-input,
    .toolbar-select {
      font-family: var(--mono);
      font-size: 11px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
      outline: none;
      transition: border-color 0.2s;
    }

    .toolbar-input {
      flex: 1;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }

    .toolbar-input::placeholder {
      color: var(--text-ghost);
    }

    .toolbar-select {
      color: var(--text-secondary);
      padding: 8px 4px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .toolbar-input:focus,
    .toolbar-select:focus {
      border-bottom-color: var(--accent);
    }

    .toolbar-select option {
      background: var(--surface);
      color: var(--text-primary);
    }

    .toolbar-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: none;
      border: 1px solid var(--line);
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .toolbar-btn:hover {
      color: var(--text-primary);
      border-color: var(--line-hover);
    }

    /* ── 分页/底部信息 ── */
    .table-footer {
      padding: 10px 0;
      font-size: 10px;
      color: var(--text-ghost);
      text-align: right;
      letter-spacing: 0.06em;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .archive-header {
        padding: 12px 16px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .header-actions {
        width: 100%;
        justify-content: space-between;
      }

      .archive-body {
        padding: 20px 16px 48px;
      }

      .stat-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .stat-cell {
        padding: 16px 10px;
      }

      .stat-number {
        font-size: 20px;
      }

      .stat-label {
        font-size: 9px;
      }

      .tab-item {
        padding: 8px 14px;
        font-size: 10px;
      }

      .toolbar {
        flex-wrap: wrap;
      }

      .toolbar-input {
        min-width: 0;
      }

      .data-table {
        font-size: 11px;
        min-width: 700px;
      }

      .data-table thead th,
      .data-table tbody td {
        padding: 7px 8px;
      }
    }

    @media (max-width: 420px) {
      .stat-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* ── 覆盖 layout.js 注入的页脚样式 ── */
    footer.global-footer {
      color: rgba(255, 255, 255, 0.08) !important;
    }

    /* 隐藏 layout.js 注入的右上角 auth-status（admin 页面自行管理） */
    #auth-status {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- Auth Guard 拦截层：验证通过前遮住一切 -->
  <div id="guard-wall">
    <div class="guard-text">身份验证中<span class="guard-dots"></span></div>
  </div>

  <!-- 顶栏 -->
  <header class="archive-header" id="archive-header" style="display:none;">
    <div class="archive-title">档案室 · <span>管理控制台</span></div>
    <div class="header-actions">
      <span id="header-user" class="cell-dim"></span>
      <a href="../index.html">← 返回前台</a>
      <button onclick="doLogout()">退出</button>
    </div>
  </header>

  <!-- 主体 -->
  <main class="archive-body" id="archive-main" style="display:none;">

    <!-- Tab Bar -->
    <nav class="tab-bar" id="tab-bar">
      <button class="tab-item active" data-tab="dashboard" onclick="switchPanel('dashboard', this)">全局真理</button>
      <button class="tab-item" data-tab="comments" onclick="switchPanel('comments', this)">评论管理</button>
      <button class="tab-item" data-tab="users" onclick="switchPanel('users', this)">灵魂档案</button>
      <button class="tab-item" data-tab="results" onclick="switchPanel('results', this)">测试切片</button>
    </nav>

    <!-- Panel 1: Dashboard -->
    <section class="panel active" id="panel-dashboard">
      <div class="stat-grid" id="stat-grid">
        <div class="stat-cell">
          <div class="stat-number" id="s-users">—</div>
          <div class="stat-label">注册用户</div>
        </div>
        <div class="stat-cell">
          <div class="stat-number" id="s-comments">—</div>
          <div class="stat-label">总评论数</div>
        </div>
        <div class="stat-cell">
          <div class="stat-number" id="s-soullab-comments">—</div>
          <div class="stat-label">人格测试评论</div>
        </div>
        <div class="stat-cell">
          <div class="stat-number" id="s-obj-comments">—</div>
          <div class="stat-label">客体化评论</div>
        </div>
        <div class="stat-cell">
          <div class="stat-number" id="s-hidden">—</div>
          <div class="stat-label">已隐藏评论</div>
        </div>
        <div class="stat-cell">
          <div class="stat-number" id="s-admins">—</div>
          <div class="stat-label">管理员</div>
        </div>
        <div class="stat-cell">
          <div class="stat-number" id="s-soullab">—</div>
          <div class="stat-label">灵性测试参与</div>
        </div>
        <div class="stat-cell">
          <div class="stat-number" id="s-objtest">—</div>
          <div class="stat-label">客体化测试参与</div>
        </div>
      </div>
      <div class="meta-line" id="dash-meta">档案加载中...</div>
    </section>

    <!-- Panel 2: Comments -->
    <section class="panel" id="panel-comments">
      <div class="toolbar">
        <input class="toolbar-input" id="comment-search" type="text"
          placeholder="搜索评论内容或昵称..." oninput="renderComments()">
        <select class="toolbar-select" id="comment-page-filter" onchange="renderComments()">
          <option value="all">全部来源</option>
          <option value="soullab">灵性测试</option>
          <option value="objtest">客体化测评</option>
        </select>
        <select class="toolbar-select" id="comment-status-filter" onchange="renderComments()">
          <option value="all">全部状态</option>
          <option value="visible">仅正常</option>
          <option value="hidden">仅隐藏</option>
        </select>
        <button class="toolbar-btn" onclick="fetchComments()">刷新</button>
      </div>
      <div id="comments-table-area">
        <div class="loading-hint">评论档案加载中...</div>
      </div>
    </section>

    <!-- Panel 3: Users -->
    <section class="panel" id="panel-users">
      <div class="toolbar">
        <input class="toolbar-input" id="user-search" type="text"
          placeholder="搜索昵称 / 邮箱 / 角色 / 注册日期..." oninput="renderUsers()">
        <button class="toolbar-btn" onclick="fetchUsers()">刷新</button>
      </div>
      <div id="users-table-area">
        <div class="loading-hint">灵魂档案加载中...</div>
      </div>
    </section>

    <!-- Panel 4: Test Results -->
    <section class="panel" id="panel-results">
      <div class="toolbar">
        <input class="toolbar-input" id="result-search" type="text"
          placeholder="搜索用户 / 测试类型 / 结果 ..." oninput="renderResults()">
        <button class="toolbar-btn" onclick="fetchResults()">刷新</button>
      </div>
      <div id="results-table-area">
        <div class="loading-hint">测试切片加载中...</div>
      </div>
    </section>

  </main>

  <!-- ╔══════════════════════════════════════════╗
       ║  全局脚本引入（必须按此顺序）               ║
       ╚══════════════════════════════════════════╝ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/supabase-config.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/layout.js"></script>

  <script>
    /* ═══════════════════════════════════════════
       Admin Console — 冷酷档案室 核心逻辑
       ═══════════════════════════════════════════ */
    (function () {
      'use strict';

      // ╔════════════════════════════════════════╗
      // ║  ★ 管理员邮箱白名单（安全防线）           ║
      // ║  在此处修改为你的管理员邮箱               ║
      // ╚════════════════════════════════════════╝
      const ADMIN_EMAILS = [
        'qingye51920@gmail.com'   // ← 请替换为你的真实管理员邮箱
      ];

      const guardWall = document.getElementById('guard-wall');
      const headerEl = document.getElementById('archive-header');
      const mainEl = document.getElementById('archive-main');

      let adminUser = null;
      let usersCache = [];
      let commentCache = [];
      let resultsCache = [];
      let commentProfileMap = {};
      let profilesMap = {};

      // ── 核心工具 ──
      const db = () => window.supabaseClient || window.db || null;
      const _escDiv = document.createElement('div');
      const esc = t => { _escDiv.textContent = String(t ?? ''); return _escDiv.innerHTML; };
      const escAttr = v => String(v || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      // ── 时间格式化 ──
      const _p = n => String(n).padStart(2, '0');
      function fmtDt(isoStr, withTime) {
        if (!isoStr) return '—';
        const d = new Date(isoStr);
        const date = `${d.getFullYear()}-${_p(d.getMonth() + 1)}-${_p(d.getDate())}`;
        return withTime ? `${date} ${_p(d.getHours())}:${_p(d.getMinutes())}` : date;
      }
      function fmtShort(isoStr) {
        if (!isoStr) return '—';
        return new Date(isoStr).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }

      // ── 头像渲染 ──
      const EMOJIS = ['🙂', '😄', '😎', '🦊', '🐼', '🐶', '🐱', '🌙', '✨', '🍀', '🎭', '🧠'];
      function pickEmoji(seed) {
        let h = 0; const s = String(seed || '');
        for (let i = 0; i < s.length; i++) { h = (h << 5) - h + s.charCodeAt(i); h |= 0; }
        return EMOJIS[Math.abs(h) % EMOJIS.length];
      }

      function getAvatarValue(p) {
        if (!p || typeof p !== 'object') return '';
        return p.avatar_url || p.avatar || (p.avatar_emoji ? `emoji:${p.avatar_emoji}` : '');
      }

      function renderAvatar(val, seed) {
        if (typeof val === 'string' && val.startsWith('emoji:'))
          return `<span class="avatar-dot">${esc(val.slice(6) || pickEmoji(seed))}</span>`;
        if (typeof val === 'string' && /^(https?:\/\/|data:image\/)/.test(val) && !val.includes('api.dicebear.com'))
          return `<img class="avatar-dot" src="${escAttr(val)}" alt="">`;
        return `<span class="avatar-dot">${pickEmoji(seed)}</span>`;
      }

      // ── 批量拉取 profiles ──
      async function fetchProfileMap(ids) {
        const unique = [...new Set((ids || []).filter(Boolean))];
        if (!unique.length) return {};
        try {
          const { data } = await db().from('profiles').select('*').in('id', unique);
          return Object.fromEntries((data || []).map(p => [p.id, p]));
        } catch (_) { return {}; }
      }

      // ── 表检测 ──
      function isMissingTable(err, name) {
        const m = String(err?.message || '');
        return m.includes(`'public.${name}'`) || m.includes('PGRST205') || m.includes(name);
      }

      // ══════════════════════════════════════
      //  Auth Guard — 绝对安全防线
      // ══════════════════════════════════════
      function isAdminUser(user) {
        if (!user) return false;
        if (ADMIN_EMAILS.includes(user.email)) return true;
        if (user.app_metadata?.role === 'admin') return true;
        if (user.app_metadata?.is_admin === true) return true;
        if (user.user_metadata?.is_admin === true) return true;
        return false;
      }

      async function checkAdminFromDB(userId) {
        try {
          const { data } = await db()?.from('profiles').select('is_admin').eq('id', userId).maybeSingle();
          return data?.is_admin === true;
        } catch (_) { return false; }
      }

      async function enforceAuth() {
        const client = db();
        if (!client) { eject(); return; }

        let user = window.currentUser || null;
        if (!user) {
          try {
            const { data: { session } } = await client.auth.getSession();
            user = session?.user || null;
          } catch (_) { /* ignore */ }
        }

        if (!user) { eject(); return; }

        const localAdmin = isAdminUser(user);
        const dbAdmin = await checkAdminFromDB(user.id);

        if (!localAdmin && !dbAdmin) { eject(); return; }

        adminUser = user;
        revealConsole(user);
      }

      function eject() {
        window.location.replace('../index.html');
      }

      function revealConsole(user) {
        document.getElementById('header-user').textContent = user.email || '';
        headerEl.style.display = '';
        mainEl.style.display = '';
        guardWall.classList.add('fade-out');
        setTimeout(() => { guardWall.style.display = 'none'; }, 450);

        // 加载所有数据
        loadDashboard();
        fetchComments();
        fetchUsers();
        fetchResults();
      }

      // ══════════════════════════════════════
      //  Tab 切换
      // ══════════════════════════════════════
      window.switchPanel = function (panelId, btn) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const target = document.getElementById('panel-' + panelId);
        if (target) {
          target.classList.remove('active');
          void target.offsetWidth;
          target.classList.add('active');
        }
      };

      // ══════════════════════════════════════
      //  Panel 1: 全局真理看板（Dashboard）
      // ══════════════════════════════════════
      async function loadDashboard() {
        const c = db();
        if (!c) return;

        const metaEl = document.getElementById('dash-meta');
        metaEl.textContent = '数据拉取中...';

        let commentsUnavailable = false;
        let resultViewsUnavailable = false;

        try {
          // 用户 & 管理员
          // 快捷计数器
          const cnt = (table, filter) => {
            let q = c.from(table).select('*', { count: 'exact', head: true });
            if (filter) q = filter(q);
            return q;
          };

          const [usersRes, adminRes] = await Promise.all([
            cnt('profiles'), cnt('profiles', q => q.eq('is_admin', true))
          ]);
          animateNumber('s-users', usersRes.count || 0);
          animateNumber('s-admins', adminRes.count || 0);

          // 评论统计
          const commentRes = await cnt('comments');
          if (commentRes.error) {
            commentsUnavailable = isMissingTable(commentRes.error, 'comments');
            ['s-comments', 's-soullab-comments', 's-obj-comments', 's-hidden'].forEach(id => animateNumber(id, 0));
          } else {
            animateNumber('s-comments', commentRes.count || 0);
            const [slRes, objRes, hiddenRes] = await Promise.all([
              cnt('comments', q => q.eq('page_type', 'soullab')),
              cnt('comments', q => q.eq('page_type', 'objtest')),
              cnt('comments', q => q.eq('is_hidden', true))
            ]);
            animateNumber('s-soullab-comments', slRes.count || 0);
            animateNumber('s-obj-comments', objRes.count || 0);
            animateNumber('s-hidden', hiddenRes.count || 0);
          }

          // 测试参与统计
          const [soullabRv, objtestRv] = await Promise.all([
            cnt('result_views', q => q.eq('page_type', 'soullab')),
            cnt('result_views', q => q.eq('page_type', 'objtest'))
          ]);
          if (soullabRv.error && objtestRv.error) {
            resultViewsUnavailable = true;
            animateNumber('s-soullab', 0);
            animateNumber('s-objtest', 0);
          } else {
            animateNumber('s-soullab', soullabRv.error ? 0 : (soullabRv.count || 0));
            animateNumber('s-objtest', objtestRv.error ? 0 : (objtestRv.count || 0));
          }

          // 状态行
          const now = new Date().toLocaleString('zh-CN', { hour12: false });
          let metaHtml = `当前登录：<strong>${esc(adminUser?.email || '未知')}</strong> · 数据快照：<strong>${now}</strong>`;
          if (commentsUnavailable) metaHtml += '<br>⚠ comments 表缺失，评论功能不可用';
          if (resultViewsUnavailable) metaHtml += '<br>⚠ result_views 表缺失，测试参与统计回退为 0';
          metaEl.innerHTML = metaHtml;

        } catch (err) {
          metaEl.textContent = '数据拉取失败: ' + (err.message || '未知错误');
        }
      }

      function animateNumber(elId, target) {
        const el = document.getElementById(elId);
        if (!el) return;
        target = Number(target) || 0;
        if (target === 0) { el.textContent = '0'; return; }

        let current = 0;
        const step = Math.max(1, Math.ceil(target / 30));
        const timer = setInterval(() => {
          current += step;
          if (current >= target) {
            current = target;
            clearInterval(timer);
          }
          el.textContent = current.toLocaleString();
        }, 28);
      }

      // ══════════════════════════════════════
      //  Panel 2: 评论管理（Comments）
      // ══════════════════════════════════════
      window.fetchComments = async function () {
        const c = db();
        const area = document.getElementById('comments-table-area');
        if (!c) { area.innerHTML = '<div class="empty-state">客户端未就绪</div>'; return; }

        area.innerHTML = '<div class="loading-hint">评论档案加载中...</div>';

        try {
          const { data, error } = await c.from('comments').select('*').order('created_at', { ascending: false }).limit(300);
          if (error) {
            if (isMissingTable(error, 'comments')) {
              area.innerHTML = '<div class="empty-state">comments 表缺失，评论管理暂不可用</div>';
              return;
            }
            throw error;
          }
          commentCache = data || [];
          commentProfileMap = await fetchProfileMap(commentCache.map(c => c.user_id));
          renderComments();
        } catch (err) {
          area.innerHTML = `<div class="empty-state">加载失败: ${esc(err.message)}</div>`;
        }
      };

      window.renderComments = function () {
        const area = document.getElementById('comments-table-area');
        const search = (document.getElementById('comment-search')?.value || '').trim().toLowerCase();
        const pageFilter = document.getElementById('comment-page-filter')?.value || 'all';
        const statusFilter = document.getElementById('comment-status-filter')?.value || 'all';

        const rows = (commentCache || []).filter(c => {
          const profile = commentProfileMap[c.user_id] || {};
          const nickname = (profile.nickname || '').toLowerCase();
          const content = (c.content || '').toLowerCase();
          const matchSearch = !search || nickname.includes(search) || content.includes(search);
          const matchPage = pageFilter === 'all' || c.page_type === pageFilter;
          const matchStatus =
            statusFilter === 'all' ||
            (statusFilter === 'hidden' && c.is_hidden) ||
            (statusFilter === 'visible' && !c.is_hidden);
          return matchSearch && matchPage && matchStatus;
        });

        if (rows.length === 0) {
          area.innerHTML = '<div class="empty-state">没有匹配的评论</div>';
          return;
        }

        let html = `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>用户</th>
                <th>来源</th>
                <th>内容</th>
                <th>图片</th>
                <th>时间</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>`;

        rows.forEach(c => {
          const profile = commentProfileMap[c.user_id] || {};
          const pageLabel = c.page_type === 'soullab' ? '人格测试' : '客体化';
          const imgCell = c.image_url
            ? `<img class="comment-img-thumb" src="${escAttr(c.image_url)}" onclick="window.open(this.src)">`
            : '<span class="cell-dim">—</span>';

          html += `
              <tr class="${c.is_hidden ? 'row-hidden' : ''}">
                <td>
                  <span class="cell-user">
                    ${renderAvatar(getAvatarValue(profile), c.user_id)}
                    <span>${esc(profile.nickname || '未知用户')}</span>
                  </span>
                </td>
                <td><span class="tag">${pageLabel}</span></td>
                <td class="cell-truncate">${esc(c.content || '')}</td>
                <td>${imgCell}</td>
                <td class="cell-mono cell-dim" style="white-space:nowrap">${fmtShort(c.created_at)}</td>
                <td>${c.is_hidden ? '<span class="tag tag--warn">已隐藏</span>' : '<span class="tag">正常</span>'}</td>
                <td>
                  <span class="btn-gap">
                    <button class="btn-sm btn-sm--warn" onclick="toggleHideComment('${c.id}', ${!c.is_hidden})">${c.is_hidden ? '恢复' : '隐藏'}</button>
                    <button class="btn-sm btn-sm--danger" onclick="deleteComment('${c.id}')">删除</button>
                  </span>
                </td>
              </tr>`;
        });

        html += `
            </tbody>
          </table>
        </div>
        <div class="table-footer">共 ${rows.length} 条记录</div>`;

        area.innerHTML = html;
      };

      window.toggleHideComment = async function (id, hide) {
        await db()?.from('comments').update({ is_hidden: hide }).eq('id', id);
        await Promise.all([fetchComments(), loadDashboard()]);
      };

      window.deleteComment = async function (id) {
        if (!confirm('确定永久删除这条评论？')) return;
        await db()?.from('comments').delete().eq('id', id);
        await Promise.all([fetchComments(), loadDashboard()]);
      };

      // ══════════════════════════════════════
      //  Panel 3: 灵魂档案库（Users）
      // ══════════════════════════════════════
      window.fetchUsers = async function () {
        const c = db();
        const area = document.getElementById('users-table-area');
        if (!c) { area.innerHTML = '<div class="empty-state">客户端未就绪</div>'; return; }

        area.innerHTML = '<div class="loading-hint">灵魂档案加载中...</div>';
        try {
          const { data, error } = await c.from('profiles').select('*').order('created_at', { ascending: false }).limit(500);
          if (error) throw error;
          usersCache = data || [];
          renderUsers();
        } catch (err) {
          area.innerHTML = `<div class="empty-state">加载失败: ${esc(err.message)}</div>`;
        }
      };

      window.renderUsers = function () {
        const area = document.getElementById('users-table-area');
        const keyword = (document.getElementById('user-search')?.value || '').trim().toLowerCase();

        const filtered = usersCache.filter(u => {
          if (!keyword) return true;
          const haystack = `${u.nickname || ''} ${u.email || ''} ${u.is_admin ? '管理员' : '普通用户'} ${fmtDt(u.created_at)}`.toLowerCase();
          return haystack.includes(keyword);
        });

        if (filtered.length === 0) {
          area.innerHTML = '<div class="empty-state">无匹配档案</div>';
          return;
        }

        let html = `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>头像</th>
                <th>昵称</th>
                <th>邮箱</th>
                <th>角色</th>
                <th>注册时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>`;

        filtered.forEach(u => {
          html += `
              <tr>
                <td>${renderAvatar(getAvatarValue(u), u.id)}</td>
                <td>${esc(u.nickname || '—')}</td>
                <td class="cell-dim">${esc(u.email || '—')}</td>
                <td>${u.is_admin ? '<span class="tag tag--accent">管理员</span>' : '<span class="tag">普通用户</span>'}</td>
                <td class="cell-mono cell-dim">${fmtDt(u.created_at)}</td>
                <td>
                  <span class="btn-gap">
                    <button class="btn-sm" onclick="toggleAdmin('${u.id}', ${!u.is_admin})">${u.is_admin ? '取消管理员' : '设为管理员'}</button>
                    <button class="btn-sm btn-sm--danger" onclick="deleteUser('${u.id}', '${escAttr(u.nickname || u.email || '该用户')}')">删除</button>
                  </span>
                </td>
              </tr>`;
        });

        html += `
            </tbody>
          </table>
        </div>
        <div class="table-footer">共 ${filtered.length} 条记录${keyword ? ' (已过滤)' : ''}</div>`;

        area.innerHTML = html;
      };

      window.toggleAdmin = async function (id, makeAdmin) {
        await db()?.from('profiles').update({ is_admin: makeAdmin }).eq('id', id);
        await Promise.all([fetchUsers(), loadDashboard()]);
      };

      window.deleteUser = async function (id, displayName) {
        if (!confirm(`确定删除用户「${displayName}」？这会连同认证账号一起删除。`)) return;
        const { error } = await db()?.rpc('admin_delete_user', { target_user_id: id });
        if (error) { alert(`删除失败：${error.message || '请先执行管理员 SQL 脚本'}`); return; }
        await Promise.all([fetchUsers(), fetchComments(), loadDashboard()]);
      };

      // ══════════════════════════════════════
      //  Panel 4: 测试数据切片（Test Results）
      // ══════════════════════════════════════
      window.fetchResults = async function () {
        const c = db();
        const area = document.getElementById('results-table-area');
        if (!c) { area.innerHTML = '<div class="empty-state">客户端未就绪</div>'; return; }

        area.innerHTML = '<div class="loading-hint">测试切片加载中...</div>';
        try {
          const { data, error } = await c.from('result_views').select('*').order('created_at', { ascending: false }).limit(200);
          if (error) {
            if (isMissingTable(error, 'result_views')) {
              area.innerHTML = '<div class="empty-state">result_views 表尚未创建，测试数据暂不可用</div>';
              return;
            }
            throw error;
          }
          resultsCache = data || [];
          profilesMap = await fetchProfileMap(resultsCache.map(r => r.user_id));
          renderResults();
        } catch (err) {
          area.innerHTML = `<div class="empty-state">加载失败: ${esc(err.message)}</div>`;
        }
      };

      window.renderResults = function () {
        const area = document.getElementById('results-table-area');
        const keyword = (document.getElementById('result-search')?.value || '').trim().toLowerCase();

        const typeMap = {
          'soullab': '灵性人格',
          'objtest': '客体化'
        };

        const filtered = resultsCache.filter(r => {
          if (!keyword) return true;
          const profile = profilesMap[r.user_id] || {};
          const haystack = `${profile.nickname || ''} ${profile.email || ''} ${typeMap[r.page_type] || r.page_type || ''} ${r.result_key || ''} ${r.result_label || ''}`.toLowerCase();
          return haystack.includes(keyword);
        });

        if (filtered.length === 0) {
          area.innerHTML = '<div class="empty-state">无匹配测试记录</div>';
          return;
        }

        let html = `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>用户</th>
                <th>测试类型</th>
                <th>结果</th>
                <th>时间</th>
              </tr>
            </thead>
            <tbody>`;

        filtered.forEach((r, i) => {
          const profile = profilesMap[r.user_id] || {};
          const userName = profile.nickname || profile.email || (r.user_id ? r.user_id.slice(0, 8) + '...' : '匿名');
          const typeLabel = typeMap[r.page_type] || r.page_type || '—';
          const resultStr = r.result_label || r.result_key || r.score || '—';

          html += `
              <tr>
                <td class="cell-dim cell-mono">${String(i + 1).padStart(3, '0')}</td>
                <td>${esc(userName)}</td>
                <td><span class="tag">${esc(typeLabel)}</span></td>
                <td><span class="tag tag--accent">${esc(resultStr)}</span></td>
                <td class="cell-mono cell-dim">${fmtDt(r.created_at, true)}</td>
              </tr>`;
        });

        html += `
            </tbody>
          </table>
        </div>
        <div class="table-footer">共 ${filtered.length} 条记录${keyword ? ' (已过滤)' : ''}</div>`;

        area.innerHTML = html;
      };

      // ══════════════════════════════════════
      //  退出登录
      // ══════════════════════════════════════
      window.doLogout = async function () {
        try { await db()?.auth.signOut(); } catch (_) { /* ignore */ }
        window.location.replace('../index.html');
      };

      // ══════════════════════════════════════
      //  启动
      // ══════════════════════════════════════
      function boot() {
        const c = db();
        if (!c?.auth) { setTimeout(eject, 500); return; }

        const { data: { subscription } } = c.auth.onAuthStateChange((_event, session) => {
          window.currentUser = session?.user || null;
        });
        setTimeout(() => {
          enforceAuth();
          subscription?.unsubscribe();
        }, 800);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
      } else {
        boot();
      }

    })();
  </script>

</body>

</html>
